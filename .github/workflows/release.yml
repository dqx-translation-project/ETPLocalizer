name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: publish
        run: dotnet publish ETPLocalizer.csproj -c Release -o publish

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/etp.exe
            publish/dat_db.db
          generate_release_notes: true
